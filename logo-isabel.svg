<svg xmlns="http://www.w3.org/2000/svg" viewBox="82 28 235 138" width="235" height="138">
  <!-- Variação C: Sem fundo, cepa integrada ao "I" como ornamento -->
  <rect x="82" y="28" width="235" height="138" fill="#FAFAF7" rx="10"/>

  <!-- Cepa como ornamento lateral do "I" -->
  <g fill="none" stroke="#3D6B42" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ramo que nasce da base do I e sobe curvando -->
    <path d="M118,108 C116,98 110,90 106,82 C102,74 106,66 112,60"
          stroke-width="1.5" opacity="0.6"/>

    <!-- Folha pequena no topo do ramo -->
    <g transform="translate(112,58) rotate(20) scale(0.4)">
      <path d="M0,0 C-6,-16 -2,-28 0,-34 C2,-28 6,-16 0,0Z" fill="#3D6B42" fill-opacity="0.3" stroke-width="1.3"/>
      <path d="M0,0 C-14,-8 -16,-22 -12,-28 C-8,-24 -2,-18 0,0Z" fill="#3D6B42" fill-opacity="0.2" stroke-width="1.3"/>
      <path d="M0,0 C14,-8 16,-22 12,-28 C8,-24 2,-18 0,0Z" fill="#3D6B42" fill-opacity="0.2" stroke-width="1.3"/>
    </g>

    <!-- Gavinha curta -->
    <path d="M108,76 C104,72 100,68 102,63 C104,60 106,62 105,65"
          stroke-width="0.9" opacity="0.45"/>

    <!-- Três bagas pequenas pendendo do ramo -->
    <g transform="translate(106,86)" fill="#3D6B42" fill-opacity="0.3" stroke-width="0.8">
      <circle cx="-2" cy="0" r="2"/>
      <circle cx="2" cy="0" r="2"/>
      <circle cx="0" cy="3.5" r="1.8"/>
    </g>
  </g>

  <!-- Main logotype: IsAbel -->
  <text x="120" y="108" font-family="'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="78" font-weight="700" fill="#2C3E50" letter-spacing="-1">I</text>
  <text x="151" y="108" font-family="'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="54" font-weight="400" fill="#5D6D7E" letter-spacing="-0.5">s</text>
  <text x="176" y="108" font-family="'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="78" font-weight="700" fill="#2C3E50" letter-spacing="-1">A</text>
  <text x="236" y="108" font-family="'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="54" font-weight="400" fill="#5D6D7E" letter-spacing="-0.5">bel</text>

  <!-- Tagline -->
  <text x="302" y="150" font-family="'Garamond', 'EB Garamond', 'Cormorant Garamond', 'Times New Roman', serif"
        font-size="13" font-weight="400" fill="#8E9EAB" text-anchor="end"
        letter-spacing="4">WIKI ESPÍRITA</text>
</svg>
